name: HITAISI CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: hitaisi
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      # Opt into Node.js 24 for GitHub's JavaScript actions to avoid the Node 20 deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/hitaisi?sslmode=disable
      DJANGO_ENV: production
      SECRET_KEY: ci-secret-key
      PYTHON_VERSION: 3.12
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      BASE_URL: ${{ secrets.BASE_URL }}
  
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.12

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-django pytest-cov requests

    - name: Wait for Postgres
      run: |
        sudo apt-get install -y postgresql-client
        until pg_isready -h localhost -p 5432 -U postgres; do
          echo "Waiting for postgres..."
          sleep 2
        done

    - name: Run migrations
      run: |
        python manage.py migrate

    - name: Run tests
      run: |
        pytest -v tests \
          --cov=. \
          --cov-report=xml \
          --cov-report=html \
          --cov-fail-under=70
      
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
    
    - name: Upload coverage html report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-html
        path: htmlcov
