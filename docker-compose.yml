services:

  web:
    build: .
    container_name: hitaisi_web

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/')\""]
      interval: 30s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15
    container_name: hitaisi_db

    environment:
      POSTGRES_DB: hitaisi
      POSTGRES_USER: hitaisi_user
      POSTGRES_PASSWORD: hitaisi_pass

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hitaisi_user -d hitaisi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: hitaisi_redis

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: